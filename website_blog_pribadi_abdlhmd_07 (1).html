<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Abdlhmd07 - Blog Pribadi</title>
  <style>
    body { font-family: Arial; margin:0; background:#fafafa; color:#333; transition:0.3s; }
    .dark { background:#121212; color:#eee; }
    header { background:linear-gradient(45deg,#833ab4,#fd1d1d,#fcb045); color:#fff; padding:20px; text-align:center; }
    .profile{text-align:center;padding:20px;}
    .profile img{width:120px;height:120px;border-radius:50%;}
    .username{font-size:22px;font-weight:bold;}
    .bio{font-size:14px;color:#777;}
    .stats{display:flex;justify-content:center;gap:20px;margin-top:10px;}
    .posts{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;padding:20px;}
    .post{background:#fff;border-radius:10px;overflow:hidden;position:relative;}
    .dark .post{background:#1e1e1e;}
    .post img{width:100%;height:200px;object-fit:cover;}
    .caption{padding:10px;}
    .like-btn{position:absolute;bottom:10px;right:10px;background:#0008;color:#fff;border:none;padding:5px 10px;border-radius:20px;cursor:pointer;}
    .comment-box{padding:10px;}
    input{width:100%;padding:5px;border-radius:5px;border:1px solid #ccc;}
    .controls{padding:20px;text-align:center;}
    button{cursor:pointer;padding:8px 12px;border:none;border-radius:5px;}
    .upload{margin-top:10px;}
    footer{text-align:center;padding:15px;background:#222;color:#fff;}
  </style>
</head>
<body>

<header>
  <h1>Abdlhmd07 Blog</h1>
</header>

<section class="profile">
  <img src="https://via.placeholder.com/120">
  <div class="username">@Abdlhmd07_</div>
  <div class="bio">Blog pribadi gue 😎</div>
  <div class="stats">
    <div><b id="postCount">0</b> Post</div>
    <div><b>500</b> Followers</div>
    <div><b>300</b> Following</div>
  </div>
</section>

<div class="controls">
  <button onclick="toggleDarkMode()">🌙 Dark Mode</button>
  <div class="upload">
    <input type="file" id="uploadImg">
    <input type="text" id="caption" placeholder="Caption...">
    <button onclick="addPost()">Upload Post</button>
  </div>
</div>

<section class="posts" id="posts"></section>

<footer>© 2026 Abdlhmd07_</footer>

<script>
let posts = JSON.parse(localStorage.getItem('posts')) || [];

function renderPosts(){
  const container=document.getElementById('posts');
  container.innerHTML='';

  posts.forEach((p,i)=>{
    const div=document.createElement('div');
    div.className='post';
    div.innerHTML=`
      <img src="${p.img}">
      <div class="caption">${p.caption}</div>
      <button class="like-btn" onclick="likePost(${i}, this)">❤️ ${p.likes}</button>
      <div class="comment-box"><input placeholder="Komentar..."></div>
    `;
    container.appendChild(div);
  });

  document.getElementById('postCount').innerText=posts.length;
}

function addPost(){
  const file=document.getElementById('uploadImg').files[0];
  const caption=document.getElementById('caption').value;

  if(!file) return alert('Pilih gambar dulu');

  const reader=new FileReader();
  reader.onload=function(e){
    posts.unshift({img:e.target.result,caption,likes:0});
    localStorage.setItem('posts',JSON.stringify(posts));
    renderPosts();
  }
  reader.readAsDataURL(file);
}

function likePost(i,btn){
  posts[i].likes++;
  localStorage.setItem('posts',JSON.stringify(posts));
  btn.innerText='❤️ '+posts[i].likes;
}

function toggleDarkMode(){
  document.body.classList.toggle('dark');
}

renderPosts();
</script>

</body>
</html>
